{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 mt-4">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-coffee text-white text-center py-3">
                <h3 class="mb-0">Edit {{ shop.name }}</h3>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-coffee w-100 mt-4">Save changes</button>
                </form>
                <div class="mt-3 text-center">
                    <a href="{% url 'shops:detail' slug=shop.slug %}" class="text-muted">Cancel</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
