{% load static %}
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>SpillTheBeans</title>
</head>
<body>
  <nav>
    <a href="{% url 'home' %}">
      <img src="{% static 'images/logo.png' %}" alt="SpillTheBeans logo" height="40">
    </a>
    <a href="{% url 'home' %}">Home</a> |
    <a href="{% url 'drinks:list' %}">Drinks</a> |
    <a href="{% url 'shops:list' %}">Shops</a> |
    {% if user.is_authenticated %}
      <a href="/accounts/profile/">Profile</a> |
    {% else %}
      <a href="/accounts/login/">Login</a> |
    {% endif %}
  </nav>
  <hr>
  {% block content %}
  {% endblock %}
</body>
</html>
