{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 mt-4">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-coffee text-white text-center py-3">
                <h3 class="mb-0">Review {{ drink.name }}</h3>
                <small>From {{ drink.shop.name }}</small>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-coffee w-100 mt-4">
                        <i class="bi bi-check2-circle me-2"></i> Save Review
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
